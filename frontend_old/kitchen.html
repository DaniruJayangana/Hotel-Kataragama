<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Kataragama - Kitchen Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/auth.js"></script>
<script>
    // 1. Force authentication on page load
    checkAuth();

    // 2. Use secureFetch instead of standard fetch
    async function loadData() {
        const res = await secureFetch('/api/billing/dashboard');
        const data = await res.json();
        
        // Handle standardized error
        if (!res.ok) {
            console.error("Error:", data.error);
            return;
        }
        console.log("Data loaded:", data);
    }
</script>

</head>
<body class="bg-slate-900 text-slate-100 font-sans p-8">
    <nav class="bg-slate-800 p-4 flex gap-6">
    <a href="index.html" class="text-white hover:text-blue-400">Dashboard</a>
    <a href="checkin.html" class="text-white hover:text-blue-400">Check-In</a>
    <a href="billing.html" class="text-white hover:text-blue-400">Billing</a>
    <button onclick="logout()" class="ml-auto text-red-400">Logout</button>
</nav>

    <header class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-orange-500">KITCHEN DISPLAY SYSTEM</h1>
            <p class="text-slate-400 text-sm">Live Active Orders Preparation Monitor</p>
        </div>
        <button onclick="fetchActiveOrders()" class="bg-orange-600 hover:bg-orange-700 text-white font-semibold py-2 px-4 rounded-lg transition">
            🔄 Refresh Queue
        </button>
    </header>

    <main id="kds-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <p class="text-slate-400 col-span-3 text-center py-12">Loading live kitchen stream...</p>
    </main>

    <script>
        // 1. FETCH ALL CURRENT ACTIVE TICKETS (PENDING & COOKING)
        async function fetchActiveOrders() {
            const gridContainer = document.getElementById('kds-grid');
            try {
                const response = await secureFetch('http://localhost:5000/api/restaurant/orders/active');
                const orders = await response.json();
                
                gridContainer.innerHTML = '';
                
                if (orders.length === 0) {
                    gridContainer.innerHTML = `
                        <div class="col-span-3 text-center py-12 bg-slate-800 rounded-xl border border-slate-700">
                            <p class="text-slate-400 text-lg">🎉 All caught up! No pending tickets.</p>
                        </div>`;
                    return;
                }
                
                orders.forEach(order => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl flex flex-col justify-between";
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-xs font-bold uppercase tracking-wider bg-amber-500/10 text-amber-400 px-2.5 py-1 rounded-full border border-amber-500/20">
                                    ${order.order_status}
                                </span>
                                <span class="text-slate-400 text-sm font-mono">#${order._id}</span>
                            </div>
                            <h3 class="text-xl font-bold text-white mb-2">Table Number: <span class="text-orange-400">${order.table_number}</span></h3>
                            <p class="text-slate-400 text-sm mb-4">Bill Account: LKR ${order.total_amount}</p>
                        </div>
                        <button onclick="updateOrderStatus('${order._id}', 'Served')" 
                                class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 rounded-lg transition cursor-pointer">
                            Mark as Served
                        </button>
                    `;
                    gridContainer.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching active orders:', error);
                gridContainer.innerHTML = `
                    <div class="col-span-3 text-center py-12 bg-red-950/20 rounded-xl border border-red-900/50">
                        <p class="text-red-400 font-semibold">⚠️ Cannot connect to backend server on port 5000.</p>
                    </div>`;
            }
        }

        // 2. NEW FUNCTION: EXECUTE LIFE CYCLE STATE ADJUSTMENT
        async function updateOrderStatus(orderId, newStatus) {
            try {
                const response = await secureFetch(`http://localhost:5000/api/restaurant/order/${orderId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    // Instantly rebuild grid stream without full manual page reloads
                    fetchActiveOrders();
                } else {
                    const errData = await response.json();
                    alert(`Status alteration failure: ${errData.error || 'Validation error'}`);
                }
            } catch (error) {
                console.error('Network Error:', error);
                alert('Infrastructure pipeline connectivity interrupt.');
            }
        }

        window.onload = fetchActiveOrders;
    </script>
</body>
</html>
