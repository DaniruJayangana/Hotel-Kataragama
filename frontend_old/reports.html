<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Financial Reporting | Hotel Kataragama</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   <script src="js/auth.js"></script>
<script>
    // 1. Force authentication on page load
    checkAuth();

    // 2. Use secureFetch instead of standard fetch
    async function loadData() {
        const res = await secureFetch('/api/billing/dashboard');
        const data = await res.json();
        
        // Handle standardized error
        if (!res.ok) {
            console.error("Error:", data.error);
            return;
        }
        console.log("Data loaded:", data);
    }
</script>


</head>
<body class="bg-slate-900 text-slate-100 p-8">
<nav class="bg-slate-800 p-4 flex gap-6">
    <a href="index.html" class="text-white hover:text-blue-400">Dashboard</a>
    <a href="checkin.html" class="text-white hover:text-blue-400">Check-In</a>
    <a href="billing.html" class="text-white hover:text-blue-400">Billing</a>
    <button onclick="logout()" class="ml-auto text-red-400">Logout</button>
</nav>

    <header class="mb-8 border-b border-slate-700 pb-4">
        <h1 class="text-3xl font-bold text-emerald-500">REVENUE ANALYTICS</h1>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
            <canvas id="revenueChart"></canvas>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
            <table class="w-full text-left text-sm">
                <thead><tr class="text-slate-400 uppercase text-xs"><th>Date</th><th>Amount</th><th>Method</th></tr></thead>
                <tbody id="report-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchReport() {
            const res = await secureFetch('http://localhost:5000/api/billing/reports/revenue?startDate=2026-05-01&endDate=2026-05-31');
            const data = await res.json();
            
            // Populate Table
            const body = document.getElementById('report-body');
            body.innerHTML = data.map(p => `
                <tr class="border-b border-slate-700">
                    <td class="py-2">${new Date(p.createdAt).toLocaleDateString()}</td>
                    <td class="py-2 font-mono text-emerald-400">LKR ${p.amount_paid.toLocaleString()}</td>
                    <td class="py-2">${p.payment_method}</td>
                </tr>
            `).join('');

            // Initialize Chart Logic here...
        }



        window.onload = fetchReport;




    </script>
</body>
</html>
