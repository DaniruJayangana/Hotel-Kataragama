<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Kataragama - Billing & Checkout</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="js/auth.js"></script>
<script>
    // 1. Force authentication on page load
    checkAuth();

    // 2. Use secureFetch instead of standard fetch
    async function loadData() {
        const res = await secureFetch('/api/billing/dashboard');
        const data = await res.json();
        
        // Handle standardized error
        if (!res.ok) {
            console.error("Error:", data.error);
            return;
        }
        console.log("Data loaded:", data);
    }
</script>


</head>
<body class="bg-slate-900 text-slate-100 font-sans p-8">
    <nav class="bg-slate-800 p-4 flex gap-6">
    <a href="index.html" class="text-white hover:text-blue-400">Dashboard</a>
    <a href="checkin.html" class="text-white hover:text-blue-400">Check-In</a>
    <a href="billing.html" class="text-white hover:text-blue-400">Billing</a>
    <button onclick="logout()" class="ml-auto text-red-400">Logout</button>
</nav>

    <header class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-violet-500">BILLING & INVOICING TERMINAL</h1>
            <p class="text-slate-400 text-sm">Guest Departure Ledger & Payment Settlement</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl h-fit">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">Select Active Entity</label>
            <select id="active-rooms-dropdown" onchange="loadInvoiceDetails()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-violet-500 transition">
                <option value="">-- Choose Room or Table --</option>
            </select>
        </div>

        <div class="md:col-span-2 bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-2xl relative">
            <div id="invoice-placeholder" class="text-center py-20 text-slate-500">
                <p class="text-lg font-medium">Select a room or table to compute the invoice.</p>
            </div>

            <div id="invoice-card" class="hidden space-y-6">
                <div class="flex justify-between items-start border-b border-slate-700 pb-4">
                    <div>
                        <h2 id="inv-room-id" class="text-3xl font-black text-white">ID</h2>
                        <p id="inv-booking-id" class="text-violet-400 font-mono text-xs mt-1">-</p>
                    </div>
                </div>

                <div id="stay-details-box" class="grid grid-cols-2 gap-4 text-sm bg-slate-900 p-4 rounded-lg border border-slate-700/50">
                    <div>
                        <p class="text-slate-400 text-xs uppercase font-bold tracking-wider">Primary Guest</p>
                        <p id="inv-guest-name" class="font-semibold text-white mt-1">-</p>
                    </div>
                    <div>
                        <p class="text-slate-400 text-xs uppercase font-bold tracking-wider">Stay Timeline</p>
                        <p id="inv-dates" class="text-white font-medium mt-1">-</p>
                    </div>
                </div>

                <div class="space-y-3">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">Settlement Charges</h3>
                    <div id="room-rate-row" class="flex justify-between text-sm py-2 border-b border-slate-700/30">
                        <span class="text-slate-300">Room Base Rate</span>
                        <span id="inv-base-rate" class="font-mono text-white">LKR 0.00</span>
                    </div>
                    <div class="flex justify-between text-base font-bold pt-4">
                        <span class="text-slate-200">Total Gross Amount</span>
                        <span id="inv-total-bill" class="font-mono text-emerald-400 text-xl">LKR 0.00</span>
                    </div>
                </div>

                <button onclick="processCheckout()" class="w-full mt-6 bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-lg transition">
                    Complete Payment
                </button>
            </div>
        </div>
    </main>

    <script>
        let globalActiveData = []; // Combined rooms and tables

        async function fetchActiveOccupancy() {
            const dropdown = document.getElementById('active-rooms-dropdown');
            try {
                const [roomsRes, tablesRes] = await Promise.all([
                    secureFetch('http://localhost:5000/api/bookings/dashboard'),
                    secureFetch('http://localhost:5000/api/restaurant/orders/active-tables')
                ]);
                
                const rooms = await roomsRes.json();
                const tables = await tablesRes.json();
                
                dropdown.innerHTML = '<option value="">-- Choose Room or Table --</option>';
                globalActiveData = [...rooms.map(r => ({...r, type: 'room'})), ...tables.map(t => ({...t, type: 'table'}))];

                rooms.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b._id; // Using internal ID
                    opt.innerText = `Room ${b.room_id._id} - ${b.guest_id.first_name}`;
                    dropdown.appendChild(opt);
                });

                tables.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = `table-${t.table_number}`;
                    opt.innerText = `Table ${t.table_number} - Dining Tab`;
                    dropdown.appendChild(opt);
                });
            } catch (err) { console.error(err); }
        }

        async function loadInvoiceDetails() {
            const val = document.getElementById('active-rooms-dropdown').value;
            if (!val) {
                document.getElementById('invoice-card').classList.add('hidden');
                document.getElementById('invoice-placeholder').classList.remove('hidden');
                return;
            }

            const isTable = val.startsWith('table-');
            const targetId = isTable ? val.split('-')[1] : val;
            
            // UI Setup
            document.getElementById('invoice-card').classList.remove('hidden');
            document.getElementById('invoice-placeholder').classList.add('hidden');
            document.getElementById('stay-details-box').style.display = isTable ? 'none' : 'grid';
            document.getElementById('room-rate-row').style.display = isTable ? 'none' : 'flex';

            let total = 0;
            // 1. If Room, calculate Stay Price
            if (!isTable) {
                const b = globalActiveData.find(x => x._id === targetId);
                const nights = Math.ceil((new Date(b.check_out_date) - new Date(b.check_in_date)) / 86400000) || 1;
                const rate = b.room_id.room_type_id?.base_price || 4500;
                total = nights * rate;
                document.getElementById('inv-base-rate').innerText = `LKR ${total.toLocaleString()}`;
                document.getElementById('inv-room-id').innerText = `Room ${b.room_id._id}`;
            }

            // 2. Fetch Food Tab
            try {
                const res = await secureFetch(`http://localhost:5000/api/restaurant/orders/unpaid/${targetId}`);
                const orders = await res.json();
                let foodTotal = orders.reduce((sum, o) => sum + (o.total_amount || 0), 0);
                
                if (foodTotal > 0) {
                    total += foodTotal;
                    // Inject food row... (Logic from previous snippet)
                }
            } catch (e) {}

            document.getElementById('inv-total-bill').innerText = `LKR ${total.toLocaleString()}`;
            window.activeId = targetId;
            window.isTable = isTable;
        }

        async function processCheckout() {
    if (!confirm("Confirm settlement and checkout?")) return;

    try {
        let endpoint = window.isTable 
            ? `/api/restaurant/orders/pay-room/${window.activeId}`
            : `/api/billing/checkout`; // You'll need to pass the invoice ID here

        const res = await secureFetch(endpoint, {
            method: 'PUT', // or POST, depending on your backend
            body: JSON.stringify({ /* include required fields like invoice_id */ })
        });

        const data = await res.json();
        if (res.ok) {
            alert("Success: " + data.message);
            fetchActiveOccupancy(); // Refresh the list
        } else {
            alert("Error: " + data.error);
        }
    } catch (err) {
        alert("Transaction Failed: " + err.message);
    }
}

        window.onload = fetchActiveOccupancy;
    </script>
</body>
</html>
