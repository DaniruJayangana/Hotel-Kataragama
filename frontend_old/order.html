<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Kataragama - Place Restaurant Order</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <script src="js/auth.js"></script>
<script>
    // 1. Force authentication on page load
    checkAuth();

    // 2. Use secureFetch instead of standard fetch
    async function loadData() {
        const res = await secureFetch('/api/billing/dashboard');
        const data = await res.json();
        
        // Handle standardized error
        if (!res.ok) {
            console.error("Error:", data.error);
            return;
        }
        console.log("Data loaded:", data);
    }
</script>

</head>
<body class="bg-slate-900 text-slate-100 font-sans p-8">
    <nav class="bg-slate-800 p-4 flex gap-6">
    <a href="index.html" class="text-white hover:text-blue-400">Dashboard</a>
    <a href="checkin.html" class="text-white hover:text-blue-400">Check-In</a>
    <a href="billing.html" class="text-white hover:text-blue-400">Billing</a>
    <button onclick="logout()" class="ml-auto text-red-400">Logout</button>
</nav>

    <header class="max-w-xl mx-auto mb-8 border-b border-slate-800 pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black tracking-tight text-orange-500">NEW KITCHEN ORDER</h1>
            <p class="text-slate-400 text-xs">Room Service & Dining Entry Form</p>
        </div>
        <a href="index.html" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 py-1.5 px-3 rounded-lg border border-slate-700 transition">
            🏠 Hub
        </a>
    </header>

    <main class="max-w-xl mx-auto bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-2xl">
        <form id="order-form" onsubmit="submitKitchenOrder(event)" class="space-y-5">
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Room / Table Number</label>
                <input type="text" id="table_number" required placeholder="e.g., 102 or 7" 
                       class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-orange-500 transition font-mono">
                <p class="text-[11px] text-slate-500 mt-1">Enter a numerical room or dining table number (letters will be stripped automatically).</p>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Order Items</label>
                <div id="items-container" class="space-y-3"></div>
                <button type="button" onclick="addItemRow()" class="mt-3 text-xs bg-slate-700 hover:bg-slate-600 text-orange-400 font-bold py-2 px-4 rounded-lg border border-slate-600 transition">
                    ➕ Add Item
                </button>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Live Estimated Total (LKR)</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-slate-500 font-mono text-sm">LKR</span>
                    <input type="number" id="bill_amount" readonly value="0"
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 pl-12 text-slate-400 focus:outline-none font-mono cursor-not-allowed">
                </div>
            </div>

            <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-lg transition shadow-lg tracking-wide uppercase text-sm mt-2">
                🚀 Send Order to Kitchen Queue
            </button>
        </form>

        <div id="status-banner" class="hidden mt-4 p-3 rounded-lg text-center text-xs font-semibold"></div>
    </main>

    <script>
        // Local baseline inventory system. 
        let menuInventory = [
            { _id: "FD001", item_name: "Kataragama Special Rice", price: 1200 },
            { _id: "FD002", item_name: "Devilled Chicken Kothu", price: 950 },
            { _id: "BV001", item_name: "Fresh Lime Juice", price: 350 },
            { _id: "DS001", item_name: "Watalappan", price: 400 }
        ];

        window.onload = function() {
            addItemRow();
        };

        function addItemRow() {
            const container = document.getElementById('items-container');
            const rowId = 'row-' + Date.now();
            
            const row = document.createElement('div');
            row.id = rowId;
            row.className = "flex gap-2 items-center bg-slate-900 p-3 rounded-lg border border-slate-700 row-item-node";
            
            let itemOptions = menuInventory.map(item => 
                `<option value="${item._id}" data-price="${item.price}">${item.item_name} (LKR ${item.price})</option>`
            ).join('');
            
            row.innerHTML = `
                <div class="flex-1">
                    <select required onchange="calculateTotal()"
                            class="item-id w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm text-white focus:outline-none">
                        <option value="">-- Choose Food Item --</option>
                        ${itemOptions}
                    </select>
                </div>
                <div class="w-20">
                    <input type="number" placeholder="Qty" min="1" value="1" required oninput="calculateTotal()"
                           class="item-qty w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm text-center text-white focus:outline-none font-mono">
                </div>
                <button type="button" onclick="removeItemRow('${rowId}')" class="text-red-400 hover:text-red-500 px-2 text-sm">
                    🗑️
                </button>
            `;
            container.appendChild(row);
        }

        function removeItemRow(rowId) {
            const container = document.getElementById('items-container');
            if (container.getElementsByClassName('row-item-node').length > 1) {
                document.getElementById(rowId).remove();
                calculateTotal();
            } else {
                alert("An order requires at least one item.");
            }
        }

        function calculateTotal() {
            let total = 0;
            const rows = document.getElementsByClassName('row-item-node');
            
            for (let row of rows) {
                const select = row.querySelector('.item-id');
                const qtyInput = row.querySelector('.item-qty');
                
                const selectedOption = select.options[select.selectedIndex];
                const price = selectedOption ? parseFloat(selectedOption.getAttribute('data-price')) || 0 : 0;
                const qty = parseFloat(qtyInput.value) || 0;
                
                total += (price * qty);
            }
            
            document.getElementById('bill_amount').value = total;
        }

        async function submitKitchenOrder(event) {
            event.preventDefault(); 
            const banner = document.getElementById('status-banner');
            const tableRawValue = document.getElementById('table_number').value.trim();

            // FIX: Strips out text tags like "RM" or "Room" and enforces raw integers for schema compatibility
            const cleanedTableNumber = parseInt(tableRawValue.replace(/\D/g, ""), 10);

            if (isNaN(cleanedTableNumber)) {
                banner.className = "mt-4 p-3 rounded-lg text-center text-xs font-semibold bg-red-500/10 text-red-400 border border-red-500/20";
                banner.innerText = "❌ Please provide a valid room or table number digits.";
                banner.classList.remove('hidden');
                return;
            }

            const payload = {
                table_number: cleanedTableNumber,
                booking_id: null, 
                items: []
            };

            const rows = document.getElementsByClassName('row-item-node');
            for (let row of rows) {
                const select = row.querySelector('.item-id');
                const qtyInput = row.querySelector('.item-qty');

                if (!select.value) {
                    banner.className = "mt-4 p-3 rounded-lg text-center text-xs font-semibold bg-red-500/10 text-red-400 border border-red-500/20";
                    banner.innerText = "❌ Please select an item for all added rows.";
                    banner.classList.remove('hidden');
                    return;
                }

                payload.items.push({
                    menu_item_id: select.value,
                    quantity: Number(qtyInput.value)
                });
            }

            try {
                const response = await secureFetch('http://localhost:5000/api/restaurant/order/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    banner.className = "mt-4 p-3 rounded-lg text-center text-xs font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                    banner.innerText = `🎉 Success: Order ${data.order_id || 'dispatched'} sent to the Kitchen Queue for Room ${cleanedTableNumber}!`;
                    banner.classList.remove('hidden');
                    
                    document.getElementById('order-form').reset();
                    document.getElementById('items-container').innerHTML = '';
                    addItemRow();
                    document.getElementById('bill_amount').value = 0;
                } else {
                    throw new Error(data.error || data.details || "Schema rejection.");
                }
            } catch (error) {
                banner.className = "mt-4 p-3 rounded-lg text-center text-xs font-semibold bg-red-500/10 text-red-400 border border-red-500/20";
                banner.innerText = `❌ Error: ${error.message}`;
                banner.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
