<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kataragama HMS | Secure Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/auth.js"></script>
<script>
    // 1. Force authentication on page load
    checkAuth();

    // 2. Use secureFetch instead of standard fetch
    async function loadData() {
        const res = await secureFetch('/api/billing/dashboard');
        const data = await res.json();
        
        // Handle standardized error
        if (!res.ok) {
            console.error("Error:", data.error);
            return;
        }
        console.log("Data loaded:", data);
    }
</script>


</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen">
    <nav class="bg-slate-800 p-4 flex gap-6">
    <a href="index.html" class="text-white hover:text-blue-400">Dashboard</a>
    <a href="checkin.html" class="text-white hover:text-blue-400">Check-In</a>
    <a href="billing.html" class="text-white hover:text-blue-400">Billing</a>
    <button onclick="logout()" class="ml-auto text-red-400">Logout</button>
</nav>

    <div class="w-full max-w-sm bg-slate-900 p-8 rounded-xl border border-slate-700 shadow-2xl">
        <h2 class="text-2xl font-bold text-violet-500 mb-6 text-center">HMS ACCESS PORTAL</h2>
        
        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
            <div>
                <label class="block text-xs text-slate-400 uppercase font-bold mb-1">Username</label>
                <input type="text" id="username" required class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:border-violet-500 outline-none">
            </div>
            <div>
                <label class="block text-xs text-slate-400 uppercase font-bold mb-1">Password</label>
                <input type="password" id="password" required class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:border-violet-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-violet-600 hover:bg-violet-700 py-3 rounded-lg font-bold transition">Sign In</button>
        </form>
        <p id="error-msg" class="text-red-400 text-xs mt-4 text-center hidden"></p>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            const res = await secureFetch('http://localhost:5000/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('userToken', data.token);
                localStorage.setItem('userRole', data.role); // 'Manager', 'Staff', or 'Kitchen'
                window.location.href = 'index.html';
            } else {
                errorMsg.innerText = data.error || "Login failed.";
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
