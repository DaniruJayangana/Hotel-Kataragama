<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Kataragama - Inventory Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <script src="js/auth.js"></script>
<script>
    // 1. Force authentication on page load
    checkAuth();

    // 2. Use secureFetch instead of standard fetch
    async function loadData() {
        const res = await secureFetch('/api/billing/dashboard');
        const data = await res.json();
        
        // Handle standardized error
        if (!res.ok) {
            console.error("Error:", data.error);
            return;
        }
        console.log("Data loaded:", data);
    }
</script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans p-8">
    <nav class="bg-slate-800 p-4 flex gap-6">
    <a href="index.html" class="text-white hover:text-blue-400">Dashboard</a>
    <a href="checkin.html" class="text-white hover:text-blue-400">Check-In</a>
    <a href="billing.html" class="text-white hover:text-blue-400">Billing</a>
    <button onclick="logout()" class="ml-auto text-red-400">Logout</button>
</nav>

    <header class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-emerald-500">INVENTORY CONTROL</h1>
            <p class="text-slate-400 text-sm">Stock Levels & Supplier Management</p>
        </div>
        <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium py-2 px-4 rounded-lg border border-slate-700 transition">
            🏠 Main Hub
        </a>
    </header>

    <main class="max-w-5xl mx-auto">
        <section id="alert-section" class="mb-8">
            <h2 class="text-xl font-bold text-red-400 mb-4 flex items-center gap-2">
                ⚠️ Low Stock Alerts
            </h2>
            <div id="alert-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <p class="text-slate-500 italic">Checking stock levels...</p>
            </div>
        </section>

        <section class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
            <h2 class="text-xl font-bold text-white mb-4">Current Warehouse Stock</h2>
            <table class="w-full text-left text-sm">
                <thead>
                    <tr class="text-slate-400 border-b border-slate-700 uppercase text-xs tracking-wider">
                        <th class="pb-3">ID</th>
                        <th class="pb-3">Item Name</th>
                        <th class="pb-3">Stock</th>
                        <th class="pb-3">Reorder Level</th>
                        <th class="pb-3">Supplier</th>
                    </tr>
                </thead>
                <tbody id="inventory-body">
                    </tbody>
            </table>
        </section>
    </main>

    <script>
        async function loadInventory() {
            try {
                // 1. Load Alerts
                const alertRes = await secureFetch('http://localhost:5000/api/restaurant/inventory/low-stock');
                const alertData = await alertRes.json();
                const alertGrid = document.getElementById('alert-grid');
                
                if (alertData.alerts.length > 0) {
                    alertGrid.innerHTML = alertData.alerts.map(item => `
                        <div class="bg-red-950/30 border border-red-900 p-4 rounded-lg">
                            <p class="font-bold text-red-400">${item.item_name}</p>
                            <p class="text-xs text-red-300">Remaining: ${item.quantity_in_stock}</p>
                            <p class="text-[10px] text-red-500 uppercase mt-2">Contact: ${item.supplier_id.supplier_name}</p>
                        </div>
                    `).join('');
                } else {
                    alertGrid.innerHTML = `<p class="text-emerald-500 text-sm">✅ All stock levels healthy.</p>`;
                }

                // 2. Load Full Inventory (Requires a route like /api/restaurant/inventory/all)
                // If you don't have this, please add it to your restaurantRoutes.js
                const invRes = await secureFetch('http://localhost:5000/api/restaurant/inventory/all');
                const inventory = await invRes.json();
                
                const body = document.getElementById('inventory-body');
                body.innerHTML = inventory.map(item => `
                    <tr class="border-b border-slate-700/50 hover:bg-slate-700/20">
                        <td class="py-4 font-mono text-slate-400">${item._id}</td>
                        <td class="py-4 font-bold">${item.item_name}</td>
                        <td class="py-4 ${item.quantity_in_stock <= item.reorder_level ? 'text-red-400' : 'text-emerald-400'}">${item.quantity_in_stock}</td>
                        <td class="py-4 text-slate-400">${item.reorder_level}</td>
                        <td class="py-4 text-slate-400">${item.supplier_id ? item.supplier_id.supplier_name : 'N/A'}</td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error("Failed to load inventory:", err);
            }
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
