<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kataragama Hotel System - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>Kataragama Hotel System</h2>
            <p>Welcome back! Please login to your dashboard.</p>
        </div>
        
        <form class="login-form">
            <div class="input-group">
                <label for="username">Username / Staff ID</label>
                <input type="text" id="username" placeholder="e.g., STF001" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="login-btn">Login to System</button>
        </form>
        
        <div class="login-footer">
            <p>Solo Prototype Selection © 2026</p>
        </div>
    </div>
</body>
</html>
